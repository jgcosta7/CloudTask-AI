version: "3.9"

services:
  db:
    image: postgres:15
    container_name: cloudtask_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: CloudTask@2026
      POSTGRES_DB: cloudtask_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: cloudtask_api
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:CloudTask%402026@db:5432/cloudtask_ai
    ports:
      - "8000:8000"

volumes:
  postgres_data: